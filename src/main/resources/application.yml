management:
  endpoints:
    access:
      default: none # 모든 actuator 접근 비활성화
    web:
      exposure:
        include: health, info, metrics, threaddump
    jmx:
      exposure:
        include: health, info, metrics, threaddump
  stackdriver:
    metrics:
      export:
        enabled: true
        project-id: ${GCP_PROJECT_ID}
  server:
    port: ${ACTUATOR_PORT}

spring:
  application:
    name: diary
  profiles:
    active: ${SPRING_ACTIVE_PROFILE}

  datasource:
    url: jdbc:mysql://localhost:3306/diary
    username: ${DIARY_LOCAL_MYSQL_USERNAME}
    password: ${DIARY_LOCAL_MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  ai:
    openai:
      api-key: ${DIARY_OPEN_API_KEY}
      chat:
        options:
          model: gpt-3.5-turbo


  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true


