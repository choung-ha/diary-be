spring:
  ai:
    openai:
      base-url: ${MOCK_API_URL}

custom:
  rest-template:
    connect-timeout: ${REST_TEMPLATE_CONNECT_TIMEOUT}      # 연결 타임아웃(ms)
    read-timeout: ${REST_TEMPLATE_READ_TIMEOUT}         # 응답 대기 시간(ms)
    max-total-connections: ${REST_TEMPLATE_MAX_TOTAL_CONNECTIONS} # 전체 커넥션 수
    max-per-route: ${REST_TEMPLATE_MAX_PER_ROUTE}         # 호스트당 최대 커넥션 수

  async:
    core-pool-size: ${ASYNC_CORE_POOL_SIZE}        # 항상 유지되는 최소 스레드 수
    max-pool-size: ${ASYNC_MAX_POOL_SIZE}         # 최대 스레드 수. 요청이 너무 많고 큐까지 꽉 찼을 때
    queue-capacity: ${ASYNC_QUEUE_CAPACITY}
    thread-name-prefix: "AsyncThread-"

server:
  tomcat:
    threads:
      max: ${MAX_THREADS}
